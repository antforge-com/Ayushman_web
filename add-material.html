<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Materials</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Top bar (replaces sidebar) */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: #f3f5ed;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      z-index: 200;
    }

    .hamburger-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .hamburger {
      width: 22px;
      height: 2px;
      background: #234123;
      position: relative;
      display: block;
    }

    .hamburger::before,
    .hamburger::after {
      content: "";
      position: absolute;
      left: 0;
      width: 22px;
      height: 2px;
      background: #234123;
    }

    .hamburger::before {
      top: -6px;
    }

    .hamburger::after {
      top: 6px;
    }

    /* Slide-out drawer and backdrop */
    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 240px;
      background: #f3f5ed;
      border-right: 1px solid #e0e0e0;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 300;
      padding: 70px 0 10px;
      /* space for topbar */
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-logo {
      text-align: center;
      padding: 12px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .drawer-logo img {
      max-height: 60px;
      width: auto;
    }

    .drawer-link {
      padding: 12px 18px;
      font-size: 1em;
      color: #234123;
      text-decoration: none;
      font-weight: 500;
    }

    .drawer-link:hover {
      background-color: #e0e0e0;
    }

    .drawer-link.active {
      background-color: #e9efe9;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.28);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease, visibility 0.2s ease;
      z-index: 250;
    }

    .backdrop.open {
      opacity: 1;
      visibility: visible;
    }

    /* Main content (no sidebar margin now) */
    .main-content {
      position: relative;
      padding: 72px 2rem 2rem;
      /* top space for fixed topbar */
    }

    .corner-logo {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 60px;
      height: auto;
      z-index: 50;
    }

    @media (max-width: 900px) {
      .main-content {
        padding: 72px 1.5rem 1.5rem;
      }
    }

    @media (max-width: 600px) {
      .main-content {
        padding: 68px 0.5rem 1rem;
      }

      .corner-logo {
        top: 5px;
        right: 5px;
        width: 50px;
      }

      .drawer {
        width: 78vw;
      }

      /* slimmer drawer on small screens */
    }

    /* Form responsiveness (from your original) */
    .form-card,
    .card,
    #materialForm {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      border-radius: 8px;
      box-sizing: border-box;
      padding: 1rem 1.5rem;
      background: #fff;
      box-shadow: 0 2px 8px rgba(38, 58, 74, 0.04);
    }

    #addMaterialMsg {
      width: 100%;
      max-width: 500px;
      margin: 1rem auto 0 auto;
      box-sizing: border-box;
      padding: 0.5rem 1.5rem;
    }

    .form-card label {
      font-weight: 600;
      display: block;
      margin-bottom: 0.25rem;
    }

    .form-card input {
      width: 100%;
      margin-top: 0.5rem;
      margin-bottom: 1rem;
      padding: 0.5rem;
      font-size: 1rem;
      box-sizing: border-box;
      border-radius: 4px;
      border: 1px solid #d1d5db;
    }

    .form-card button.btn {
      width: 100%;
      padding: 0.75rem 0;
      font-size: 1.05rem;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      background: #306233;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    .form-card button.btn:hover {
      background: #234123;
    }

    /* Message styling */
    .message-success {
      color: #286d42;
      background: #e6f7e7;
      border-left: 4px solid #286d42;
      padding: 0.75em 1em;
    }

    .message-error {
      color: #872a2a;
      background: #f9e6e7;
      border-left: 4px solid #872a2a;
      padding: 0.75em 1em;
    }

    .hidden {
      display: none;
    }

    /* Mobile-specific overrides */
    @media (max-width: 600px) {

      .form-card,
      .card,
      #materialForm {
        max-width: 100vw !important;
        width: 100vw !important;
        margin-left: 0 !important;
        margin-right: 0 !important;
        border-radius: 0px !important;
        box-sizing: border-box;
        padding: 1rem 0.5rem !important;
      }

      #addMaterialMsg {
        max-width: 100vw !important;
        margin-left: 0 !important;
        margin-right: 0 !important;
        box-sizing: border-box;
        padding: 0 0.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Top bar with hamburger and logo -->
  <header class="topbar" role="banner">
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open navigation" aria-controls="drawerNav"
      aria-expanded="false">
      <span class="hamburger" aria-hidden="true"></span>
    </button>
    <img src="assets/vasavi-logo.png" alt="Vasavi Ayurveda Logo" style="height:36px; width:auto;">
  </header>

  <!-- Drawer navigation -->
  <nav class="drawer" id="drawerNav" aria-hidden="true">
    <div class="drawer-logo">
      <img src="assets/vasavi-logo.png" alt="Vasavi Ayurveda Logo">
    </div>
    <a href="index.html" class="drawer-link">Home</a>
    <a href="add-material.html" class="drawer-link active">Add Material</a>
    <a href="product-price.html" class="drawer-link">Product Price</a>
  </nav>

  <!-- Backdrop -->
  <div class="backdrop" id="backdrop"></div>

  <main class="main-content">
    <img src="assets/vasavi-logo.png" alt="Vasavi Ayurveda Logo" class="corner-logo">

    <h2 style="font-size:2rem;font-weight:700;margin-bottom:1.5rem;">Add Materials</h2>
    <button onclick="window.location.href='all-materials.html'"
      style="margin-bottom:1.5rem;padding:0.5rem 1.2rem;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#234123;font-weight:500;cursor:pointer;">All
      Purchases</button>

    <form id="materialForm" class="form-card card">
      <div>
        <label for="material">Material</label>
        <input name="material" id="material" required placeholder="Enter Material Name">
      </div>
      <div>
        <label for="dealer">Dealer</label>
        <input name="dealer" id="dealer" required placeholder="Enter name of the dealer">
      </div>
      <div>
        <label for="quantity">Quantity</label>
        <input name="quantity" id="quantity" type="number" min="1" required placeholder="Enter Quantity">
      </div>
      <div>
        <label for="pricePerKg">Price/Kg</label>
        <input name="pricePerKg" id="pricePerKg" type="number" min="0" required placeholder="Price per kg">
      </div>
      <div>
        <input name="price" id="price" type="number" min="0" required placeholder="Price" readonly>
      </div>
      <div>
        <label for="gst">GST Amount</label>
        <input name="gst" id="gst" type="number" min="0" required placeholder="Enter GST Amount">
      </div>
      <div>
        <label for="hamali">Hamali</label>
        <input name="hamali" id="hamali" type="number" min="0" required placeholder="Enter Hamali Amount">
      </div>
      <button class="btn" type="submit">+ Add Purchase</button>
    </form>

    <div id="addMaterialMsg" class="hidden"></div>
  </main>

  <!-- Your existing module (unchanged) -->
  <script type="module" src="add-material.js"></script>
     
  <!-- Hamburger/drawer logic -->
  <script>
    (function () {
      const btn = document.getElementById('hamburgerBtn');
      const drawer = document.getElementById('drawerNav');
      const backdrop = document.getElementById('backdrop');

      function openDrawer() {
        drawer.classList.add('open');
        backdrop.classList.add('open');
        drawer.setAttribute('aria-hidden', 'false');
        btn.setAttribute('aria-expanded', 'true');
        const firstLink = drawer.querySelector('a');
        if (firstLink) firstLink.focus({ preventScroll: true });
        document.body.style.overflow = 'hidden';
      }

      function closeDrawer() {
        drawer.classList.remove('open');
        backdrop.classList.remove('open');
        drawer.setAttribute('aria-hidden', 'true');
        btn.setAttribute('aria-expanded', 'false');
        btn.focus({ preventScroll: true });
        document.body.style.overflow = '';
      }

      btn.addEventListener('click', () => {
        drawer.classList.contains('open') ? closeDrawer() : openDrawer();
      });

      backdrop.addEventListener('click', closeDrawer);

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && drawer.classList.contains('open')) closeDrawer();
      });

      drawer.addEventListener('click', (e) => {
        const a = e.target.closest('a[href]');
        if (a) closeDrawer();
      });
    })();
  </script>
</body>
</html>
